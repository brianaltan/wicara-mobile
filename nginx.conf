server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.png {
        try_files $uri =404;
        access_log off;
    }

    location = /manifest.json {
        try_files $uri =404;
        access_log off;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|wasm|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
